<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Secret River 🌙 </title>
    
    <!-- Firebase SDKs (使用兼容版，无需构建工具) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap');

        :root {
            --river-dark: #0f0c29; --river-light: #302b63; --orange: #ff9d00;
            --pink: #ff4757; --glow-color: #fff700; --panel-bg: rgba(255, 255, 255, 0.98);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Quicksand', sans-serif; background: #000; overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* 🌙 梦幻夜空河流背景 */
        #game-river {
            width: 100vw; height: 100vh;
            background: linear-gradient(180deg, var(--river-dark) 0%, var(--river-light) 100%);
            position: relative; overflow: hidden;
        }

        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: twinkle 2s infinite alternate; }
        @keyframes twinkle { from { opacity: 0.2; } to { opacity: 0.8; } }

        /* 🍊 抛柑特效 */
        .orange {
            position: absolute; width: 60px; height: 60px;
            background: radial-gradient(circle at 30% 30%, #ffd900, var(--orange));
            border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center;
            font-size: 28px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            animation: drift 25s linear infinite, bob 4s ease-in-out infinite;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 10;
        }
        .orange::after { content: '🍃'; position: absolute; top: -5px; right: 8px; font-size: 14px; }

        /* ✨ 全球同步发光特效 */
        .orange.glow-active {
            transform: scale(1.4); 
            box-shadow: 0 0 40px 15px var(--glow-color), 0 0 70px 25px var(--orange); 
            z-index: 100;
        }

        @keyframes drift { from { right: -100px; } to { right: 120vw; } }
        @keyframes bob { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-15px) rotate(5deg); } }

        /* 🎀 可爱 UI 面板 */
        .panel {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            background: var(--panel-bg); border-radius: 30px; padding: 25px; width: 85%; max-width: 320px;
            text-align: center; display: none; box-shadow: 0 20px 50px rgba(0,0,0,0.4); z-index: 1000;
            border: 4px solid var(--orange); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .panel.active { display: block; transform: translate(-50%, -50%) scale(1); }

        .btn-main {
            background: linear-gradient(180deg, #ff9d00, #e67e22); color: white; border: none; padding: 14px 30px;
            border-radius: 50px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 15px; width: 100%;
            box-shadow: 0 5px 0 #b35900; transition: 0.1s;
        }
        .btn-main:active { transform: translateY(3px); box-shadow: 0 2px 0 #b35900; }

        .footer { position: fixed; bottom: 40px; width: 100%; text-align: center; z-index: 500;}
        .avatar-opt { display: inline-block; padding: 10px; font-size: 35px; cursor: pointer; border-radius: 15px; border: 3px solid transparent; }
        .avatar-opt.selected { background: #fff4e6; border-color: var(--orange); }
        input, textarea { width: 100%; border: 2px solid #eee; border-radius: 15px; padding: 12px; font-size: 16px; box-sizing: border-box; outline: none; font-family: inherit; }
        .comment-wrap { background: #fdf2f0; border-radius: 15px; padding: 8px 12px; margin: 6px 0; font-size: 14px; text-align: left; border-left: 4px solid var(--orange); color: #444; }
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.75); backdrop-filter: blur(3px); display: none; z-index: 500; }
    </style>
</head>
<body>

<div id="game-river">
    <div style="color: white; text-align: center; padding: 40px 20px;">
        <h1 style="margin:0; font-size: 28px; letter-spacing: 1px;">🌙 抛柑 🌙</h1>
        <p style="margin: 5px 0; opacity: 0.7; font-size: 14px;">Throw an orange. Comment on an orange to make it glow! ✨</p>
    </div>
</div>

<div class="footer">
    <button class="btn-main" style="width: auto; padding: 15px 40px;" onclick="openPanel('setupPanel')">🍊 Throw My Orange</button>
</div>

<div id="overlay" class="overlay" onclick="closeAll()"></div>

<!-- 第一步：身份设置 -->
<div id="setupPanel" class="panel">
    <h3 style="color: #d35400; margin-top:0;">Join the River</h3>
    <div style="margin-bottom: 15px;">
        <span class="avatar-opt selected" onclick="pickAvatar(this, '🦊')">🦊</span>
        <span class="avatar-opt" onclick="pickAvatar(this, '🐰')">🐰</span>
        <span class="avatar-opt" onclick="pickAvatar(this, '🐯')">🐯</span>
        <span class="avatar-opt" onclick="pickAvatar(this, '🐼')">🐼</span>
    </div>
    <input type="text" id="nickInput" placeholder="Enter Nickname...">
    <button class="btn-main" onclick="nextToWish()">Continue</button>
</div>

<!-- 第二步：写愿望 -->
<div id="wishPanel" class="panel">
    <h3 id="wishHeader" style="color: #d35400; margin-top:0;">Make a Wish</h3>
    <textarea id="wishInput" rows="4" placeholder="Your secret wish..."></textarea>
    <button class="btn-main" onclick="tossOrange()">Toss into World River 🌊</button>
</div>

<!-- 第三步：查看与互动 -->
<div id="viewPanel" class="panel">
    <div id="viewAv" style="font-size: 50px;"></div>
    <h4 id="viewNick" style="margin: 5px 0; color: #e67e22;"></h4>
    <p id="viewWish" style="background: #fff; padding: 15px; border-radius: 15px; color: #555; border: 1px solid #eee;"></p>
    <div id="chatBox" style="max-height: 100px; overflow-y: auto; margin-bottom: 10px;"></div>
    <div style="display: flex; gap: 8px;">
        <input type="text" id="commentIn" placeholder="Send a blessing..." style="flex: 1;">
        <button onclick="submitComment()" style="background: var(--pink); border: none; border-radius: 15px; color: white; padding: 0 15px; font-weight: bold;">Send</button>
    </div>
    <button onclick="closeAll()" style="margin-top: 15px; border: none; background: none; color: #999;">Close</button>
</div>

<script>
    // --- 1. 使用你提供的配置初始化 ---
    const firebaseConfig = {
        apiKey: "AIzaSyDR2OVu3DE7laX7YwHnmgyDViPHGYx9rfw",
        authDomain: "the-secret-river.firebaseapp.com",
        projectId: "the-secret-river",
        storageBucket: "the-secret-river.firebasestorage.app",
        messagingSenderId: "951490966646",
        appId: "1:951490966646:web:51f9c8f712b7ed291b1b57",
        // 注意：Realtime Database 需要 databaseURL
        databaseURL: "https://the-secret-river-default-rtdb.firebaseio.com" 
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const riverRef = db.ref('oranges');

    let myAv = '🦊';
    let myName = '';
    let activeId = null;
    let orangeData = {};

    // --- 2. 全球同步逻辑 ---
    riverRef.on('value', (snapshot) => {
        const data = snapshot.val() || {};
        orangeData = data;
        
        // 清理旧橘子并重新绘制
        document.querySelectorAll('.orange').forEach(el => el.remove());
        Object.keys(data).forEach(id => {
            createOrangeUI(data[id], id);
            
            // 如果这个橘子刚刚被评论（3秒内），触发全局发光
            if (data[id].lastGlowAt > (Date.now() - 3000)) {
                triggerGlow(id);
            }
        });

        // 如果当前打开了详情页，实时刷新评论
        if (activeId && data[activeId]) {
            renderComments(data[activeId].comments);
        }
    });

    function tossOrange() {
        const wish = document.getElementById('wishInput').value;
        if(!wish) return alert("Write something first!");

        const newO = {
            avatar: myAv,
            nick: myName || "Dreamer",
            wish: wish,
            top: Math.random() * 60 + 20,
            lastGlowAt: 0,
            timestamp: Date.now()
        };
        
        riverRef.push(newO);
        closeAll();
        document.getElementById('wishInput').value = "";
    }

    function submitComment() {
        const val = document.getElementById('commentIn').value;
        if(!val || !activeId) return;

        // 1. 推送评论到数据库
        const commentRef = db.ref(`oranges/${activeId}/comments`);
        commentRef.push({
            user: myName || "Guest",
            text: val,
            time: Date.now()
        });

        // 2. 更新发光时间戳，通知全球玩家发光
        db.ref(`oranges/${activeId}`).update({
            lastGlowAt: firebase.database.ServerValue.TIMESTAMP
        });

        document.getElementById('commentIn').value = "";
    }

    // --- 3. UI  ---
    function createOrangeUI(data, id) {
        const div = document.createElement('div');
        div.className = 'orange';
        div.id = id;
        div.style.top = data.top + '%';
        div.innerHTML = '🍊';
        div.onclick = () => viewOrange(id);
        
        //  ID same
        const speed = 20 + (id.charCodeAt(0) % 15);
        div.style.animation = `drift ${speed}s linear infinite, bob 4s ease-in-out infinite`;
        document.getElementById('game-river').appendChild(div);
    }

    function viewOrange(id) {
        activeId = id;
        const data = orangeData[id];
        document.getElementById('viewAv').innerText = data.avatar;
        document.getElementById('viewNick').innerText = data.nick;
        document.getElementById('viewWish').innerText = data.wish;
        renderComments(data.comments);
        openPanel('viewPanel');
    }

    function renderComments(commentsObj) {
        const box = document.getElementById('chatBox');
        if(!commentsObj) { box.innerHTML = ""; return; }
        const commentsArr = Object.values(commentsObj);
        box.innerHTML = commentsArr.map(c => `
            <div class="comment-wrap"><b>${c.user}:</b> ${c.text}</div>
        `).join('');
        box.scrollTop = box.scrollHeight;
    }

    function triggerGlow(id) {
        const el = document.getElementById(id);
        if (el) {
            el.classList.add('glow-active');
            setTimeout(() => el.classList.remove('glow-active'), 3000);
        }
    }

    function pickAvatar(el, icon) {
        document.querySelectorAll('.avatar-opt').forEach(o => o.classList.remove('selected'));
        el.classList.add('selected');
        myAv = icon;
    }

    function openPanel(id) {
        document.getElementById('overlay').style.display = 'block';
        document.getElementById(id).classList.add('active');
    }

    function nextToWish() {
        myName = document.getElementById('nickInput').value;
        document.getElementById('setupPanel').classList.remove('active');
        document.getElementById('wishHeader').innerText = myAv + " " + myName + "'s Wish";
        document.getElementById('wishPanel').classList.add('active');
    }

    function closeAll() {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.getElementById('overlay').style.display = 'none';
        activeId = null;
    }

    // 绘制星星
    for (let i = 0; i < 25; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.width = '2px'; star.style.height = '2px';
        star.style.left = Math.random() * 100 + 'vw'; star.style.top = Math.random() * 100 + 'vh';
        document.getElementById('game-river').appendChild(star);
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Secret River 🌙</title>
    
    <!-- 1. Firebase Real-time Engine -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap');
        :root { --river-dark: #0b0e21; --orange: #ff9d00; --pink: #ff4757; --glow: #fff700; --panel: rgba(255, 255, 255, 0.98); }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Quicksand', sans-serif; background: #000; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        
        /* 🌙 Animated Global River */
        #game-river { width: 100vw; height: 100vh; background: linear-gradient(180deg, #0b0e21 0%, #1b2735 100%); position: relative; overflow: hidden; }
        
        /* Floating Stars */
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.4; animation: twinkle 2s infinite alternate; }
        @keyframes twinkle { from { opacity: 0.1; } to { opacity: 0.7; } }

        /* 🍊 The Global Oranges */
        .orange {
            position: absolute; width: 60px; height: 60px;
            background: radial-gradient(circle at 30% 30%, #ffd900, var(--orange));
            border-radius: 50%; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            font-size: 28px; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            animation: drift 25s linear infinite, bob 4s ease-in-out infinite;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }
        .orange::after { content: '🍃'; position: absolute; top: -5px; right: 8px; font-size: 14px; }

        /* ✨ THE GLOBAL GLOW: Triggered when ANYONE comments */
        .orange.glow-active {
            transform: scale(1.4);
            box-shadow: 0 0 40px 15px var(--glow), 0 0 70px 25px var(--orange);
            z-index: 100;
        }

        @keyframes drift { from { right: -100px; } to { right: 120vw; } }
        @keyframes bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* 🎀 Cute UI Panels */
        .panel {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            background: var(--panel); border-radius: 30px; padding: 25px;
            width: 85%; max-width: 320px; text-align: center; display: none;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); z-index: 1000; border: 4px solid var(--orange);
        }
        .panel.active { display: block; transform: translate(-50%, -50%) scale(1); }

        .btn-main {
            background: linear-gradient(#ff9d00, #e67e22); color: white; border: none;
            padding: 15px 30px; border-radius: 50px; font-weight: bold; width: 100%;
            margin-top: 15px; box-shadow: 0 5px 0 #b35900; cursor: pointer;
        }
        .btn-main:active { transform: translateY(3px); box-shadow: 0 2px 0 #b35900; }

        input, textarea { width: 100%; border: 2px solid #eee; border-radius: 15px; padding: 12px; font-size: 16px; box-sizing: border-box; outline: none; margin-top: 10px; font-family: inherit; }

        .comment-wrap {
            background: #fdf2f0; border-radius: 12px; padding: 10px; margin: 8px 0;
            font-size: 14px; text-align: left; border-left: 5px solid var(--orange); color: #444;
        }

        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(3px); display: none; z-index: 500; }
    </style>
</head>
<body>

<div id="game-river">
    <div style="color: white; text-align: center; padding: 40px 20px;">
        <h1 style="margin:0; letter-spacing: 2px;">🌙 拋柑🌙 </h1>
        <p style="opacity: 0.8; font-size: 14px;">Throw an orange. Comment on an orange to make it glow! ✨

</p>
    </div>
</div>

<div style="position: fixed; bottom: 40px; width: 100%; text-align: center;">
    <button class="btn-main" style="width: auto; padding: 15px 40px;" onclick="openPanel('setupPanel')">🍊 Throw My Orange</button>
</div>

<div id="overlay" class="overlay" onclick="closeAll()"></div>

<!-- Panels -->
<div id="setupPanel" class="panel">
    <h3 style="color: #d35400; margin:0;">Join the Ritual</h3>
    <div style="font-size: 40px; margin: 10px 0;">🦊</div>
    <input type="text" id="nickInput" placeholder="Enter Secret Nickname...">
    <button class="btn-main" onclick="nextToWish()">Continue</button>
</div>

<div id="wishPanel" class="panel">
    <h3 style="color: #d35400; margin:0;">Make a Wish</h3>
    <textarea id="wishInput" rows="4" placeholder="What is your heart's desire?"></textarea>
    <button class="btn-main" onclick="tossOrange()">Toss into the World 🌊</button>
</div>

<div id="viewPanel" class="panel">
    <div id="viewAv" style="font-size: 50px;"></div>
    <h4 id="viewNick" style="margin: 5px 0; color: #e67e22;"></h4>
    <p id="viewWish" style="background: #f9f9f9; padding: 15px; border-radius: 15px; color: #555; border: 1px solid #eee;"></p>
    
    <div id="chatBox" style="max-height: 120px; overflow-y: auto; margin-bottom: 10px; border-top: 1px solid #eee; padding-top: 10px;"></div>
    
    <div style="display: flex; gap: 8px;">
        <input type="text" id="commentIn" placeholder="Type a blessing..." style="flex: 1; margin:0;">
        <button onclick="submitComment()" style="background: var(--pink); border: none; border-radius: 15px; color: white; padding: 0 15px; font-weight: bold;">Send</button>
    </div>
    <button onclick="closeAll()" style="margin-top: 15px; border: none; background: none; color: #999; cursor: pointer;">Close</button>
</div>

<script>
    // --- 🔑 DATABASE SETUP ---
    // 1. Create a project at console.firebase.google.com
    // 2. Enable "Realtime Database" (Test Mode)
    // 3. Paste your config here:
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
        projectId: "YOUR_PROJECT",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const orangesRef = db.ref('global_river_oranges');

    let myName = '';
    let activeId = null;

    // --- 🌍 GLOBAL SYNC LOGIC ---
    // This listens for any changes in the world and updates your screen
    orangesRef.on('value', (snapshot) => {
        const data = snapshot.val() || {};
        
        // Remove oranges that are no longer in the database
        document.querySelectorAll('.orange').forEach(el => {
            if (!data[el.id]) el.remove();
        });

        // Add or update oranges
        Object.keys(data).forEach(id => {
            if (!document.getElementById(id)) {
                createOrangeUI(data[id], id);
            }
            
            // Check for the "Global Glow" signal
            if (data[id].lastGlowAt > (Date.now() - 3000)) {
                triggerGlow(id);
            }
        });

        // If you have an orange open, update the comments live
        if (activeId && data[activeId]) {
            renderComments(data[activeId].comments);
        }
    });

    function tossOrange() {
        const wish = document.getElementById('wishInput').value;
        if (!wish) return alert("Please write a wish!");
        
        const newOrange = {
            avatar: '🦊',
            nick: myName || "Stranger",
            wish: wish,
            top: Math.random() * 60 + 20,
            lastGlowAt: 0,
            comments: {}
        };
        
        orangesRef.push(newOrange);
        closeAll();
        document.getElementById('wishInput').value = "";
    }

    function submitComment() {
        const text = document.getElementById('commentIn').value;
        if (!text || !activeId) return;

        // 1. Add comment to the specific orange in the cloud
        const commentRef = db.ref(`global_river_oranges/${activeId}/comments`);
        commentRef.push({
            user: myName || "Guest",
            text: text,
            time: Date.now()
        });

        // 2. Send the "Glow" signal to everyone in the world
        db.ref(`global_river_oranges/${activeId}`).update({
            lastGlowAt: firebase.database.ServerValue.TIMESTAMP
        });

        document.getElementById('commentIn').value = "";
    }

    // --- 🎨 UI GENERATION ---
    function createOrangeUI(data, id) {
        const div = document.createElement('div');
        div.className = 'orange'; div.id = id;
        div.style.top = data.top + '%';
        div.innerHTML = '🍊';
        div.onclick = () => viewOrange(id);
        
        // Use the ID to create a unique but consistent speed for everyone
        const speed = 20 + (id.charCodeAt(0) % 15);
        div.style.animation = `drift ${speed}s linear infinite, bob 4s ease-in-out infinite`;
        document.getElementById('game-river').appendChild(div);
    }

    function viewOrange(id) {
        activeId = id;
        orangesRef.child(id).once('value', (snapshot) => {
            const data = snapshot.val();
            document.getElementById('viewAv').innerText = data.avatar;
            document.getElementById('viewNick').innerText = data.nick;
            document.getElementById('viewWish').innerText = data.wish;
            renderComments(data.comments);
            openPanel('viewPanel');
        });
    }

    function renderComments(commentsObj) {
        const box = document.getElementById('chatBox');
        if (!commentsObj) { box.innerHTML = "<small style='color:#999'>No blessings yet...</small>"; return; }
        
        const html = Object.values(commentsObj).map(c => `
            <div class="comment-wrap"><b>${c.user}:</b> ${c.text}</div>
        `).join('');
        box.innerHTML = html;
        box.scrollTop = box.scrollHeight;
    }

    function triggerGlow(id) {
        const el = document.getElementById(id);
        if (el) {
            el.classList.add('glow-active');
            setTimeout(() => el.classList.remove('glow-active'), 3000);
        }
    }

    // --- HELPERS ---
    function openPanel(id) { document.getElementById('overlay').style.display = 'block'; document.getElementById(id).classList.add('active'); }
    function nextToWish() { myName = document.getElementById('nickInput').value; document.getElementById('setupPanel').classList.remove('active'); openPanel('wishPanel'); }
    function closeAll() { document.querySelectorAll('.panel').forEach(p => p.classList.remove('active')); document.getElementById('overlay').style.display = 'none'; activeId = null; }

    // Background Stars
    for (let i = 0; i < 25; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.width = '2px'; star.style.height = '2px';
        star.style.left = Math.random() * 100 + 'vw'; star.style.top = Math.random() * 100 + 'vh';
        document.getElementById('game-river').appendChild(star);
    }
</script>
</body>
</html>

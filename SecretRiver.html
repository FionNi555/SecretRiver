<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Secret River 🌙 - Final Debug</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@700&display=swap');
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Quicksand', sans-serif; }
        
        /* 河流背景：确保它是可见的蓝色 */
        #game-river { 
            width: 100vw; height: 100vh; 
            background: linear-gradient(180deg, #0f0c29 0%, #1b2735 100%); 
            position: relative;
        }

        /* 橘子样式：增加鲜艳度 */
        .orange {
            position: absolute; width: 60px; height: 60px;
            background: #ff9800;
            background: radial-gradient(circle at 30% 30%, #ffcc80, #f57c00);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 30px; border: 2px solid #fff;
            box-shadow: 0 0 20px rgba(255,165,0,0.8);
            z-index: 100;
            top: 50%; left: 110%; /* 初始在屏幕外右侧 */
            animation: drift 20s linear infinite;
        }
        .orange::after { content: '🍃'; position: absolute; top: -5px; right: 5px; font-size: 16px; }

        @keyframes drift {
            from { left: 110%; }
            to { left: -20%; }
        }

        /* 调试控制台：非常重要 */
        #debug-log {
            position: fixed; top: 10px; left: 10px; right: 10px;
            background: rgba(255,255,255,0.9); color: #333;
            padding: 10px; border-radius: 10px; font-size: 12px;
            z-index: 9999; border: 2px solid #ff9800;
            max-height: 100px; overflow-y: auto;
        }

        .btn-main {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #ff9800; color: white; border: none; padding: 15px 30px;
            border-radius: 50px; font-weight: bold; cursor: pointer; z-index: 1000;
        }

        /* 面板样式 */
        .panel { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border-radius: 20px; padding: 20px; width: 80%; display: none; z-index: 2000; text-align: center; color: #333; border: 4px solid #ff9800; }
        .panel.active { display: block; }
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display: none; z-index: 1500; }
        textarea { width: 90%; height: 80px; margin-top: 10px; border-radius: 10px; padding: 10px; }
    </style>
</head>
<body>

<div id="debug-log">正在启动系统...</div>

<div id="game-river">
    <div style="color: white; text-align: center; padding-top: 120px; opacity: 0.5;">🌙 抛柑祈缘 🌙</div>
</div>

<button class="btn-main" onclick="openPanel()">🍊 抛个橘子测试</button>

<div id="overlay" class="overlay" onclick="closePanel()"></div>
<div id="wishPanel" class="panel">
    <h3>写下你的愿望</h3>
    <textarea id="wishInput" placeholder="写点什么..."></textarea>
    <button class="btn-main" style="position: static; margin-top: 10px;" onclick="toss()">抛向大海</button>
</div>

<script>
    // 调试辅助函数
    function log(msg) {
        const d = document.getElementById('debug-log');
        d.innerHTML += "<br>> " + msg;
        d.scrollTop = d.scrollHeight;
        console.log(msg);
    }

    // --- 1. FIREBASE 配置 ---
    const firebaseConfig = {
        apiKey: "AIzaSyDR2OVu3DE7laX7YwHnmgyDViPHGYx9rfw",
        authDomain: "the-secret-river.firebaseapp.com",
        projectId: "the-secret-river",
        storageBucket: "the-secret-river.firebasestorage.app",
        messagingSenderId: "951490966646",
        appId: "1:951490966646:web:51f9c8f712b7ed291b1b57",
        databaseURL: "https://the-secret-river-default-rtdb.firebaseio.com" 
    };

    try {
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        log("Firebase 初始化成功");

        // --- 2. 匿名登录 ---
        auth.signInAnonymously().then(() => {
            log("匿名登录成功 ✅");
            startGame(db);
        }).catch(err => {
            log("登录失败: " + err.message + " ❌ (请检查 Firebase 控制台是否开启了 Anonymous 登录)");
        });

    } catch (e) {
        log("配置错误: " + e.message);
    }

    function startGame(db) {
        const riverRef = db.ref('oranges');

        // --- 3. 监听橘子数据 ---
        riverRef.on('value', (snapshot) => {
            const data = snapshot.val();
            log("收到数据，橘子总数: " + (data ? Object.keys(data).length : 0));
            
            // 清理并重新渲染
            document.querySelectorAll('.orange').forEach(el => el.remove());
            
            if (data) {
                Object.keys(data).forEach(id => {
                    const o = data[id];
                    const div = document.createElement('div');
                    div.className = 'orange';
                    div.id = id;
                    div.innerHTML = "🍊";
                    div.style.top = (o.top || 50) + "%";
                    
                    // 随机速度防止堆叠
                    const speed = 15 + (Math.random() * 10);
                    div.style.animationDuration = speed + "s";
                    
                    document.getElementById('game-river').appendChild(div);
                });
            } else {
                // 如果是空的，自动抛一个
                log("检测到河面为空，正在抛入演示橘子...");
                riverRef.push({ nick: "System", wish: "Welcome!", top: 40, timestamp: Date.now() });
            }
        }, (error) => {
            log("读取失败: " + error.message + " (请检查 Database Rules 是否为 read: true)");
        });
    }

    // UI 逻辑
    function openPanel() { document.getElementById('wishPanel').classList.add('active'); document.getElementById('overlay').style.display = 'block'; }
    function closePanel() { document.getElementById('wishPanel').classList.remove('active'); document.getElementById('overlay').style.display = 'none'; }
    
    function toss() {
        const wish = document.getElementById('wishInput').value;
        if(!wish) return;
        firebase.database().ref('oranges').push({
            nick: "Player",
            wish: wish,
            top: 20 + Math.random() * 50,
            timestamp: Date.now()
        }).then(() => {
            log("成功抛出一个橘子！");
            closePanel();
            document.getElementById('wishInput').value = "";
        }).catch(e => log("抛出失败: " + e.message));
    }
</script>
</body>
</html>

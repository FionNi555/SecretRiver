<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Secret Spirit River 🌙</title>
    <style>
        :root {
            --river-dark: #0f0c29;
            --orange-glow: #ff9d00;
            --ui-bg: #fff5e6;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000; overflow: hidden;
        }

        /* Animated Night River */
        #game-river {
            width: 100vw; height: 100vh;
            background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
            position: relative;
        }

        /* Floating Orange Style */
        .orange {
            position: absolute; width: 55px; height: 55px;
            background: radial-gradient(circle at 30% 30%, #ffdb4d, var(--orange-glow));
            border-radius: 50%; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; box-shadow: 0 0 15px rgba(255, 157, 0, 0.6);
            animation: drift 10s linear infinite, bob 3s ease-in-out infinite;
        }

        @keyframes drift {
            from { right: -100px; }
            to { right: 110vw; }
        }
        @keyframes bob {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* UI Panels */
        .panel {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--ui-bg); border-radius: 25px; padding: 25px;
            width: 320px; text-align: center; display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000;
            border: 5px solid #ffcc80;
        }

        .avatar-option {
            display: inline-block; padding: 10px; font-size: 30px;
            cursor: pointer; border-radius: 10px; border: 2px solid transparent;
        }
        .avatar-option.selected { border-color: var(--orange-glow); background: white; }

        .btn-main {
            background: #ff5e00; color: white; border: none;
            padding: 12px 25px; border-radius: 50px; font-weight: bold;
            cursor: pointer; margin-top: 15px; width: 100%;
        }

        .footer-nav {
            position: fixed; bottom: 30px; width: 100%; text-align: center;
        }

        /* Comment Bubbles */
        .comment {
            background: #fff; border-radius: 10px; padding: 8px;
            margin: 5px 0; font-size: 13px; text-align: left; border-left: 4px solid #ff5e00;
        }

        .overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.8); display: none; z-index: 500;
        }
    </style>
</head>
<body>

<div id="game-river">
    <div style="color: white; text-align: center; padding: 20px; font-size: 20px;">
        🏮 抛柑 🏮 <br>
        <small>Throw an orange and find your fate anonymously</small>
    </div>
</div>

<div class="footer-nav">
    <button class="btn-main" style="width: auto;" onclick="showSetup()">🍊 Start My Ritual</button>
</div>

<div id="overlay" class="overlay"></div>

<!-- STEP 1: Anonymous Identity Customization -->
<div id="setupPanel" class="panel">
    <h3>Choose Your Secret Spirit</h3>
    <div id="avatarList">
        <div class="avatar-option selected" onclick="selectAvatar(this, '🐱')">🐱</div>
        <div class="avatar-option" onclick="selectAvatar(this, '🐰')">🐰</div>
        <div class="avatar-option" onclick="selectAvatar(this, '🦊')">🦊</div>
        <div class="avatar-option" onclick="selectAvatar(this, '🐼')">🐼</div>
        <div class="avatar-option" onclick="selectAvatar(this, '🐯')">🐯</div>
        <div class="avatar-option" onclick="selectAvatar(this, '🐸')">🐸</div>
    </div>
    <input type="text" id="nickInput" placeholder="Enter Secret Nickname" style="width: 80%; padding: 10px; margin-top: 15px; border-radius: 10px; border: 1px solid #ddd;">
    <button class="btn-main" onclick="showThrow()">Next: Write My Wish</button>
</div>

<!-- STEP 2: Write Wish -->
<div id="throwPanel" class="panel">
    <h3 id="spiritHeader">🐱 Spirit's Wish</h3>
    <textarea id="wishInput" style="width: 90%; height: 100px; border-radius: 10px; padding: 10px;" placeholder="I hope to meet someone who likes K-Dramas..."></textarea>
    <button class="btn-main" onclick="finalizeThrow()">Toss into the Night 🌊</button>
</div>

<!-- STEP 3: View & Comment -->
<div id="viewPanel" class="panel">
    <div id="viewAvatar" style="font-size: 40px;"></div>
    <h4 id="viewNick" style="margin: 5px 0; color: #ff5e00;"></h4>
    <p id="viewWish" style="font-style: italic; background: #eee; padding: 10px; border-radius: 10px;"></p>
    <div id="commentBox" style="max-height: 120px; overflow-y: auto; margin-bottom: 10px;"></div>
    <input type="text" id="replyInput" placeholder="Leave a nice comment..." style="width: 70%; padding: 8px;">
    <button onclick="postComment()">Post</button>
    <button onclick="hideAll()" style="display: block; width: 100%; margin-top: 10px; background: none; border: none; color: #666; cursor: pointer;">Close</button>
</div>

<script>
    let myAvatar = '🐱';
    let myNick = '';
    let oranges = [];
    let activeOrangeId = null;

    function selectAvatar(el, icon) {
        document.querySelectorAll('.avatar-option').forEach(opt => opt.classList.remove('selected'));
        el.classList.add('selected');
        myAvatar = icon;
    }

    function showSetup() {
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('setupPanel').style.display = 'block';
    }

    function showThrow() {
        myNick = document.getElementById('nickInput').value || "Secret Soul";
        document.getElementById('setupPanel').style.display = 'none';
        document.getElementById('spiritHeader').innerText = myAvatar + " " + myNick;
        document.getElementById('throwPanel').style.display = 'block';
    }

    function finalizeThrow() {
        const wish = document.getElementById('wishInput').value;
        if(!wish) return alert("Please share your wish!");

        const newOrange = {
            id: Date.now(),
            avatar: myAvatar,
            nick: myNick,
            wish: wish,
            top: Math.random() * 60 + 20,
            comments: []
        };

        oranges.push(newOrange);
        createOrangeElement(newOrange);
        hideAll();
        document.getElementById('wishInput').value = "";
    }

    function createOrangeElement(data) {
        const div = document.createElement('div');
        div.className = 'orange';
        div.style.top = data.top + '%';
        div.innerHTML = '🍊';
        div.onclick = () => viewOrange(data.id);
        
        // Random speed for drifting
        const speed = 15 + Math.random() * 15;
        div.style.animation = `drift ${speed}s linear infinite, bob 3s ease-in-out infinite`;
        
        document.getElementById('game-river').appendChild(div);
    }

    function viewOrange(id) {
        activeOrangeId = id;
        const orange = oranges.find(o => o.id === id);
        document.getElementById('viewAvatar').innerText = orange.avatar;
        document.getElementById('viewNick').innerText = orange.nick;
        document.getElementById('viewWish').innerText = `"${orange.wish}"`;
        
        renderComments(orange);
        
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('viewPanel').style.display = 'block';
    }

    function renderComments(orange) {
        const box = document.getElementById('commentBox');
        box.innerHTML = orange.comments.map(c => `
            <div class="comment"><b>${c.user}:</b> ${c.text}</div>
        `).join('');
    }

    function postComment() {
        const text = document.getElementById('replyInput').value;
        if(!text) return;
        
        const orange = oranges.find(o => o.id === activeOrangeId);
        orange.comments.push({ user: myNick || "Visitor", text: text });
        
        renderComments(orange);
        document.getElementById('replyInput').value = "";
    }

    function hideAll() {
        document.querySelectorAll('.panel, .overlay').forEach(el => el.style.display = 'none');
    }

    // Auto-spawn some example oranges
    setInterval(() => {
        if(oranges.length < 5) {
            const fake = {
                id: Math.random(),
                avatar: ['🦁','🐮','🐭'][Math.floor(Math.random()*3)],
                nick: "Stranger",
                wish: "Hope for a lucky year! 🧧",
                top: Math.random() * 60 + 20,
                comments: []
            };
            oranges.push(fake);
            createOrangeElement(fake);
        }
    }, 5000);

</script>
</body>
</html>

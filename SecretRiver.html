<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Secret River 🌙</title>
    <!-- GUN.js for Zero-Config Real-time Sync -->
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap');
        :root { --river-dark: #0b0e21; --orange: #ff9d00; --pink: #ff4757; --glow: #fff700; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Quicksand', sans-serif; background: #000; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        #game-river { width: 100vw; height: 100vh; background: linear-gradient(180deg, #0b0e21 0%, #1b2735 100%); position: relative; overflow: hidden; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: twinkle 2s infinite alternate; }
        @keyframes twinkle { from { opacity: 0.2; } to { opacity: 0.8; } }
        .orange { position: absolute; width: 60px; height: 60px; background: radial-gradient(circle at 30% 30%, #ffd900, var(--orange)); border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 28px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); animation: drift 25s linear infinite, bob 4s ease-in-out infinite; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 10; }
        .orange::after { content: '🍃'; position: absolute; top: -5px; right: 8px; font-size: 14px; }
        .orange.glow-active { transform: scale(1.4); box-shadow: 0 0 40px 15px var(--glow), 0 0 70px 25px var(--orange); z-index: 100; }
        @keyframes drift { from { right: -100px; } to { right: 120vw; } }
        @keyframes bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .panel { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); background: #fff; border-radius: 30px; padding: 25px; width: 85%; max-width: 320px; text-align: center; display: none; box-shadow: 0 20px 50px rgba(0,0,0,0.5); z-index: 1000; border: 4px solid var(--orange); }
        .panel.active { display: block; transform: translate(-50%, -50%) scale(1); }
        .btn-main { background: linear-gradient(#ff9d00, #e67e22); color: white; border: none; padding: 14px 30px; border-radius: 50px; font-weight: bold; width: 100%; margin-top: 15px; box-shadow: 0 5px 0 #b35900; }
        .btn-main:active { transform: translateY(3px); box-shadow: 0 2px 0 #b35900; }
        input, textarea { width: 100%; border: 2px solid #eee; border-radius: 15px; padding: 12px; font-size: 16px; box-sizing: border-box; outline: none; margin-top: 10px; }
        .comment-wrap { background: #fdf2f0; border-radius: 12px; padding: 8px; margin: 5px 0; font-size: 13px; text-align: left; border-left: 4px solid var(--orange); }
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display: none; z-index: 500; }
    </style>
</head>
<body>

<div id="game-river">
    <div style="color: white; text-align: center; padding: 40px 20px;">
        <h1 style="margin:0;">🌙 拋柑🌙</h1>
        <p style="opacity: 0.7; font-size: 14px;">Throw an orange. Comment on an orange to make it glow! ✨</p>
    </div>
</div>

<div style="position: fixed; bottom: 40px; width: 100%; text-align: center;">
    <button class="btn-main" style="width: auto; padding: 15px 40px;" onclick="openPanel('setupPanel')">🍊 Throw My Orange</button>
</div>

<div id="overlay" class="overlay" onclick="closeAll()"></div>

<!-- Panels -->
<div id="setupPanel" class="panel">
    <h3>Pick a Spirit</h3>
    <input type="text" id="nickInput" placeholder="Secret Nickname...">
    <button class="btn-main" onclick="nextToWish()">Continue</button>
</div>

<div id="wishPanel" class="panel">
    <h3 id="wishHeader">Make a Wish</h3>
    <textarea id="wishInput" rows="4" placeholder="Your secret wish..."></textarea>
    <button class="btn-main" onclick="tossOrange()">Toss into World River 🌊</button>
</div>

<div id="viewPanel" class="panel">
    <div id="viewAv" style="font-size: 50px;"></div>
    <h4 id="viewNick" style="margin: 5px 0; color: #e67e22;"></h4>
    <p id="viewWish" style="background: #f9f9f9; padding: 15px; border-radius: 15px; color: #444;"></p>
    <div id="chatBox" style="max-height: 100px; overflow-y: auto; margin-bottom: 10px; border-top: 1px solid #eee;"></div>
    <div style="display: flex; gap: 8px;">
        <input type="text" id="commentIn" placeholder="Type a blessing..." style="flex: 1; margin:0;">
        <button onclick="submitComment()" style="background: var(--pink); border: none; border-radius: 15px; color: white; padding: 0 10px;">Send</button>
    </div>
    <button onclick="closeAll()" style="margin-top: 15px; border: none; background: none; color: #999;">Close</button>
</div>

<script>
    // --- REAL-TIME SYNC SETUP ---
    // This connects to a public relay server. No keys needed!
    const gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
    const worldRiver = gun.get('moonlight_destiny_v1');

    let myName = '';
    let activeId = null;

    // --- LISTEN FOR GLOBAL ORANGES ---
    worldRiver.map().on((data, id) => {
        if (!data) return;
        if (!document.getElementById(id)) {
            createOrangeUI(data, id);
        } else {
            // Update glow if someone just commented
            if (data.lastCommentAt > (Date.now() - 3000)) {
                triggerGlow(id);
            }
        }
    });

    function tossOrange() {
        const wish = document.getElementById('wishInput').value;
        if (!wish) return;
        const id = 'o_' + Math.random().toString(36).substr(2, 9);
        worldRiver.get(id).put({
            avatar: '🦊',
            nick: myName || "Dreamer",
            wish: wish,
            top: Math.random() * 60 + 20,
            lastCommentAt: 0
        });
        closeAll();
    }

    function submitComment() {
        const val = document.getElementById('commentIn').value;
        if (!val || !activeId) return;

        // Save comment to this specific orange
        const commentId = Date.now().toString();
        worldRiver.get(activeId).get('comments').get(commentId).put({
            user: myName || "Guest",
            text: val
        });

        // Tell the world to glow this orange
        worldRiver.get(activeId).get('lastCommentAt').put(Date.now());
        
        document.getElementById('commentIn').value = "";
    }

    function viewOrange(id) {
        activeId = id;
        worldRiver.get(id).once((data) => {
            document.getElementById('viewAv').innerText = data.avatar;
            document.getElementById('viewNick').innerText = data.nick;
            document.getElementById('viewWish').innerText = data.wish;
            
            // Real-time comments for this orange
            const box = document.getElementById('chatBox');
            box.innerHTML = ''; 
            worldRiver.get(id).get('comments').map().on((c, cid) => {
                if(!c) return;
                const div = document.createElement('div');
                div.className = 'comment-wrap';
                div.innerHTML = `<b>${c.user}:</b> ${c.text}`;
                box.appendChild(div);
                box.scrollTop = box.scrollHeight;
            });
            openPanel('viewPanel');
        });
    }

    // --- UI HELPERS ---
    function createOrangeUI(data, id) {
        const div = document.createElement('div');
        div.className = 'orange'; div.id = id;
        div.style.top = data.top + '%';
        div.innerHTML = '🍊';
        div.onclick = () => viewOrange(id);
        const speed = 20 + (Math.random() * 10);
        div.style.animation = `drift ${speed}s linear infinite, bob 4s ease-in-out infinite`;
        document.getElementById('game-river').appendChild(div);
    }

    function triggerGlow(id) {
        const el = document.getElementById(id);
        if (el) {
            el.classList.add('glow-active');
            setTimeout(() => el.classList.remove('glow-active'), 3000);
        }
    }

    function openPanel(id) { document.getElementById('overlay').style.display = 'block'; document.getElementById(id).classList.add('active'); }
    function nextToWish() { myName = document.getElementById('nickInput').value; document.getElementById('setupPanel').classList.remove('active'); document.getElementById('wishPanel').classList.add('active'); }
    function closeAll() { document.querySelectorAll('.panel').forEach(p => p.classList.remove('active')); document.getElementById('overlay').style.display = 'none'; activeId = null; }

    // Twinkle Stars
    for (let i = 0; i < 20; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.width = '2px'; star.style.height = '2px';
        star.style.left = Math.random() * 100 + 'vw'; star.style.top = Math.random() * 100 + 'vh';
        document.getElementById('game-river').appendChild(star);
    }
</script>
</body>
</html>

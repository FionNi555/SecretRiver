<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Secret Spirit River 🌙</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap');

        :root {
            --river-dark: #0f0c29;
            --river-light: #302b63;
            --orange: #ff9d00;
            --pink: #ff4757;
            --glow-color: #fff700;
            --panel-bg: rgba(255, 255, 255, 0.98);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Quicksand', sans-serif;
            background: #000; overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* 🌙 Magical Night River */
        #game-river {
            width: 100vw; height: 100vh;
            background: linear-gradient(180deg, var(--river-dark) 0%, var(--river-light) 100%);
            position: relative;
            overflow: hidden;
        }

        /* Twinkling Stars */
        .star {
            position: absolute; background: white; border-radius: 50%;
            opacity: 0.5; animation: twinkle 2s infinite alternate;
        }
        @keyframes twinkle { from { opacity: 0.2; } to { opacity: 0.8; } }

        /* 🍊 Kawaii Oranges */
        .orange {
            position: absolute; width: 60px; height: 60px;
            background: radial-gradient(circle at 30% 30%, #ffd900, var(--orange));
            border-radius: 50%; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            font-size: 28px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            animation: drift 20s linear infinite, bob 4s ease-in-out infinite;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }
        .orange::after { content: '🍃'; position: absolute; top: -5px; right: 8px; font-size: 14px; }

        /* ✨ GLOW EFFECT: Triggered on Comment */
        .orange.glow-active {
            transform: scale(1.4);
            box-shadow: 0 0 40px 15px var(--glow-color), 0 0 70px 25px var(--orange);
            z-index: 100;
        }

        @keyframes drift {
            from { right: -100px; }
            to { right: 120vw; }
        }
        @keyframes bob {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        /* 🎀 UI Panels */
        .panel {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            background: var(--panel-bg); border-radius: 30px; padding: 25px;
            width: 85%; max-width: 320px; text-align: center; display: none;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4); z-index: 1000;
            border: 4px solid var(--orange);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .panel.active { display: block; transform: translate(-50%, -50%) scale(1); }

        .btn-main {
            background: linear-gradient(180deg, #ff9d00, #e67e22);
            color: white; border: none; padding: 14px 30px;
            border-radius: 50px; font-weight: bold; font-size: 16px;
            cursor: pointer; margin-top: 15px; width: 100%;
            box-shadow: 0 5px 0 #b35900;
            transition: all 0.1s;
        }
        .btn-main:active { transform: translateY(3px); box-shadow: 0 2px 0 #b35900; }

        .footer {
            position: fixed; bottom: 40px; width: 100%; text-align: center;
        }

        .avatar-opt {
            display: inline-block; padding: 10px; font-size: 35px;
            cursor: pointer; border-radius: 15px; border: 3px solid transparent;
        }
        .avatar-opt.selected { background: #fff4e6; border-color: var(--orange); }

        input, textarea {
            width: 100%; border: 2px solid #eee; border-radius: 15px; padding: 12px;
            font-size: 16px; box-sizing: border-box; outline: none; font-family: inherit;
        }

        .comment-wrap {
            background: #fdf2f0; border-radius: 15px; padding: 8px 12px;
            margin: 6px 0; font-size: 14px; text-align: left; border-left: 4px solid var(--orange);
            color: #444;
        }

        .overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(3px);
            display: none; z-index: 500;
        }
    </style>
</head>
<body>

<div id="game-river">
    <!-- Game HUD -->
    <div style="color: white; text-align: center; padding: 40px 20px;">
        <h1 style="margin:0; font-size: 28px; letter-spacing: 1px;">Moonlight Fate</h1>
        <p style="margin: 5px 0; opacity: 0.7; font-size: 14px;">Comment on an orange to make it glow! ✨</p>
    </div>
</div>

<div class="footer">
    <button class="btn-main" style="width: auto; padding: 15px 40px;" onclick="openPanel('setupPanel')">🍊 Throw My Orange</button>
</div>

<div id="overlay" class="overlay" onclick="closeAll()"></div>

<!-- STEP 1: Customize Identity -->
<div id="setupPanel" class="panel">
    <h3 style="color: #d35400; margin-top:0;">Pick a Spirit</h3>
    <div style="margin-bottom: 15px;">
        <span class="avatar-opt selected" onclick="pickAvatar(this, '🦊')">🦊</span>
        <span class="avatar-opt" onclick="pickAvatar(this, '🐰')">🐰</span>
        <span class="avatar-opt" onclick="pickAvatar(this, '🐯')">🐯</span>
        <span class="avatar-opt" onclick="pickAvatar(this, '🐼')">🐼</span>
    </div>
    <input type="text" id="nickInput" placeholder="Secret Nickname...">
    <button class="btn-main" onclick="nextToWish()">Continue</button>
</div>

<!-- STEP 2: Write Wish -->
<div id="wishPanel" class="panel">
    <h3 id="wishHeader" style="color: #d35400; margin-top:0;">Make a Wish</h3>
    <textarea id="wishInput" rows="4" placeholder="Share your secret wish..."></textarea>
    <button class="btn-main" onclick="tossOrange()">Toss into River 🌊</button>
</div>

<!-- STEP 3: View & Comment -->
<div id="viewPanel" class="panel">
    <div id="viewAv" style="font-size: 50px;"></div>
    <h4 id="viewNick" style="margin: 5px 0; color: #e67e22;"></h4>
    <p id="viewWish" style="background: #fff; padding: 15px; border-radius: 15px; color: #555; border: 1px solid #eee;"></p>
    
    <div id="chatBox" style="max-height: 100px; overflow-y: auto; margin-bottom: 10px;"></div>
    
    <div style="display: flex; gap: 8px;">
        <input type="text" id="commentIn" placeholder="Type a blessing..." style="flex: 1;">
        <button onclick="submitComment()" style="background: var(--pink); border: none; border-radius: 15px; color: white; padding: 0 15px; font-weight: bold;">Send</button>
    </div>
    <button onclick="closeAll()" style="margin-top: 15px; border: none; background: none; color: #999;">Not now</button>
</div>

<script>
    let myAv = '🦊';
    let myName = '';
    let oranges = [];
    let activeId = null;

    // Background Twinkle Stars
    for (let i = 0; i < 25; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.width = Math.random() * 3 + 'px';
        star.style.height = star.style.width;
        star.style.left = Math.random() * 100 + 'vw';
        star.style.top = Math.random() * 100 + 'vh';
        star.style.animationDelay = Math.random() * 2 + 's';
        document.getElementById('game-river').appendChild(star);
    }

    function pickAvatar(el, icon) {
        document.querySelectorAll('.avatar-opt').forEach(o => o.classList.remove('selected'));
        el.classList.add('selected');
        myAv = icon;
    }

    function openPanel(id) {
        document.getElementById('overlay').style.display = 'block';
        document.getElementById(id).classList.add('active');
    }

    function nextToWish() {
        myName = document.getElementById('nickInput').value || "Dreamer";
        document.getElementById('setupPanel').classList.remove('active');
        document.getElementById('wishHeader').innerText = myAv + " " + myName + "'s Wish";
        document.getElementById('wishPanel').classList.add('active');
    }

    function tossOrange() {
        const wish = document.getElementById('wishInput').value;
        if(!wish) return alert("Write something first!");

        const newO = {
            id: 'o-' + Date.now(),
            avatar: myAv,
            nick: myName,
            wish: wish,
            top: Math.random() * 60 + 20,
            comments: []
        };
        oranges.push(newO);
        createOrangeUI(newO);
        closeAll();
        document.getElementById('wishInput').value = "";
    }

    function createOrangeUI(data) {
        const div = document.createElement('div');
        div.className = 'orange';
        div.id = data.id;
        div.style.top = data.top + '%';
        div.innerHTML = '🍊';
        div.onclick = () => viewOrange(data.id);
        
        const duration = 15 + Math.random() * 10;
        div.style.animation = `drift ${duration}s linear infinite, bob 4s ease-in-out infinite`;
        document.getElementById('game-river').appendChild(div);
    }

    function viewOrange(id) {
        activeId = id;
        const data = oranges.find(o => o.id === id);
        document.getElementById('viewAv').innerText = data.avatar;
        document.getElementById('viewNick').innerText = data.nick;
        document.getElementById('viewWish').innerText = data.wish;
        updateCommentsUI(data);
        
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('viewPanel').classList.add('active');
    }

    function updateCommentsUI(data) {
        const box = document.getElementById('chatBox');
        box.innerHTML = data.comments.map(c => `
            <div class="comment-wrap"><b>${c.user}:</b> ${c.text}</div>
        `).join('');
    }

    // 🌟 THE GLOW LOGIC
    function submitComment() {
        const val = document.getElementById('commentIn').value;
        if(!val) return;
        
        const data = oranges.find(o => o.id === activeId);
        data.comments.push({ user: myName || "Guest", text: val });
        
        // Visual Glow Feedback
        const orangeEl = document.getElementById(activeId);
        if(orangeEl) {
            orangeEl.classList.add('glow-active');
            setTimeout(() => {
                orangeEl.classList.remove('glow-active');
                orangeEl.style.boxShadow = "0 0 15px 5px var(--glow-color)"; // Leave a tiny trail
            }, 3000);
        }

        updateCommentsUI(data);
        document.getElementById('commentIn').value = "";
    }

    function closeAll() {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.getElementById('overlay').style.display = 'none';
    }

    // NPC oranges for a busy river
    setInterval(() => {
        if(oranges.length < 6) {
            const fakeId = 'f-' + Math.random();
            const fake = {
                id: fakeId,
                avatar: ['🐼','🦊','🐸','🐰'][Math.floor(Math.random()*4)],
                nick: "Anonymous Spirit",
                wish: "Wishing for health and love! 🧧",
                top: Math.random() * 60 + 20,
                comments: []
            };
            oranges.push(fake);
            createOrangeUI(fake);
        }
    }, 8000);
</script>
</body>
</html>

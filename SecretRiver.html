<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌙 The Secret River 🌙</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap');
        :root { --river-dark: #0f0c29; --orange: #ff9d00; --glow: #fff700; --panel: rgba(255, 255, 255, 0.98); }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Quicksand', sans-serif; background: #000; overflow: hidden; }
        
        #game-river { 
            width: 100vw; height: 100vh; 
            background: linear-gradient(180deg, #0f0c29 0%, #302b63 100%); 
            position: relative; overflow: hidden; 
        }

        /* 🍊 橘子动画核心修复 */
        .orange {
            position: absolute; width: 60px; height: 60px;
            background: radial-gradient(circle at 30% 30%, #ffd900, var(--orange));
            border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center;
            font-size: 28px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            /* 从右向左游动 */
            animation: drift 22s linear infinite, bob 4s ease-in-out infinite;
            z-index: 10;
            left: 100%; /* 初始位置：屏幕最右侧 */
        }
        
        @keyframes drift {
            0% { left: 105%; }
            100% { left: -15%; }
        }
        
        @keyframes bob {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .orange.glow-active { transform: scale(1.4); box-shadow: 0 0 40px 15px var(--glow), 0 0 70px 25px var(--orange); z-index: 100; }
        .orange::after { content: '🍃'; position: absolute; top: -5px; right: 8px; font-size: 14px; }

        /* UI */
        .panel { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); background: var(--panel); border-radius: 30px; padding: 25px; width: 85%; max-width: 320px; text-align: center; display: none; box-shadow: 0 20px 50px rgba(0,0,0,0.5); z-index: 1000; border: 4px solid var(--orange); }
        .panel.active { display: block; transform: translate(-50%, -50%) scale(1); }
        .btn-main { background: linear-gradient(180deg, #ff9d00, #e67e22); color: white; border: none; padding: 14px 30px; border-radius: 50px; font-weight: bold; width: 100%; margin-top: 15px; cursor: pointer; }
        .footer { position: fixed; bottom: 40px; width: 100%; text-align: center; z-index: 500;}
        input, textarea { width: 100%; border: 2px solid #eee; border-radius: 15px; padding: 12px; font-size: 16px; box-sizing: border-box; outline: none; margin-top: 10px; }
        .comment-wrap { background: #fdf2f0; border-radius: 12px; padding: 8px; margin: 5px 0; font-size: 13px; text-align: left; border-left: 4px solid var(--orange); color: #444; }
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display: none; z-index: 500; }
        .avatar-opt { display: inline-block; padding: 10px; font-size: 35px; cursor: pointer; border-radius: 15px; border: 3px solid transparent; }
        .avatar-opt.selected { background: #fff4e6; border-color: var(--orange); }
    </style>
</head>
<body>

<div id="game-river">
    <div style="color: white; text-align: center; padding: 40px 20px;">
        <h1 style="margin:0; font-size: 28px;">🌙 抛柑祈缘</h1>
        <p id="statusMsg" style="opacity: 0.7; font-size: 12px;">正在观察河面...</p>
    </div>
</div>

<div class="footer">
    <button id="mainBtn" class="btn-main" style="width: auto; padding: 15px 40px; display:none;" onclick="openPanel('setupPanel')">🍊 我要抛柑</button>
</div>

<div id="overlay" class="overlay" onclick="closeAll()"></div>

<!-- Panels -->
<div id="setupPanel" class="panel">
    <h3>选择身份</h3>
    <div>
        <span class="avatar-opt selected" onclick="pickAvatar(this, '🦊')">🦊</span>
        <span class="avatar-opt" onclick="pickAvatar(this, '🐰')">🐰</span>
        <span class="avatar-opt" onclick="pickAvatar(this, '🐯')">🐯</span>
        <span class="avatar-opt" onclick="pickAvatar(this, '🐼')">🐼</span>
    </div>
    <input type="text" id="nickInput" placeholder="你的名字...">
    <button class="btn-main" onclick="nextToWish()">下一步</button>
</div>

<div id="wishPanel" class="panel">
    <h3 id="wishHeader">许下愿望</h3>
    <textarea id="wishInput" rows="4" placeholder="写下你的真心话..."></textarea>
    <button class="btn-main" onclick="tossOrange()">抛向河流 🌊</button>
</div>

<div id="viewPanel" class="panel">
    <div id="viewAv" style="font-size: 50px;"></div>
    <h4 id="viewNick" style="margin: 5px 0; color: #e67e22;"></h4>
    <p id="viewWish" style="background: #fff; padding: 15px; border-radius: 15px; color: #555;"></p>
    <div id="chatBox" style="max-height: 120px; overflow-y: auto; margin-bottom: 10px;"></div>
    <div style="display: flex; gap: 8px;">
        <input type="text" id="commentIn" placeholder="送上祝福...">
        <button onclick="submitComment()" style="background: #ff4757; border: none; border-radius: 15px; color: white; padding: 0 15px; font-weight: bold;">发送</button>
    </div>
    <button onclick="closeAll()" style="margin-top: 15px; border: none; background: none; color: #999;">关闭</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDR2OVu3DE7laX7YwHnmgyDViPHGYx9rfw",
        authDomain: "the-secret-river.firebaseapp.com",
        projectId: "the-secret-river",
        storageBucket: "the-secret-river.firebasestorage.app",
        messagingSenderId: "951490966646",
        appId: "1:951490966646:web:51f9c8f712b7ed291b1b57",
        databaseURL: "https://the-secret-river-default-rtdb.firebaseio.com" 
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    const riverRef = db.ref('oranges');

    let userUID = null;
    let myAv = '🦊';
    let myName = '';
    let activeId = null;
    let orangeData = {};

    auth.signInAnonymously().then((user) => {
        userUID = user.user.uid;
        document.getElementById('statusMsg').innerText = "已连接到月光河流 ✨";
        document.getElementById('mainBtn').style.display = "inline-block";
        checkAndSeedRiver(); 
    }).catch(() => {
        document.getElementById('statusMsg').innerText = "连接失败，请检查网络";
    });

    riverRef.on('value', (snapshot) => {
        const data = snapshot.val() || {};
        console.log("收到橘子数据:", data);
        orangeData = data;
        
        // 清理并重新渲染
        document.querySelectorAll('.orange').forEach(el => el.remove());
        
        const ids = Object.keys(data);
        if (ids.length === 0) {
            document.getElementById('statusMsg').innerText = "河面空空如也，抛下第一个橘子吧！";
        } else {
            document.getElementById('statusMsg').innerText = `当前河面有 ${ids.length} 个橘子漂流中...`;
        }

        ids.forEach(id => {
            createOrangeUI(data[id], id);
            if (data[id].lastGlowAt > (Date.now() - 3000)) triggerGlow(id);
        });
        
        if (activeId && data[activeId]) renderComments(data[activeId].comments);
    });

    function checkAndSeedRiver() {
        riverRef.once('value', (snapshot) => {
            if (snapshot.numChildren() < 5) {
                console.log("正在补种守护灵橘子...");
                const spirits = [
                    {av:'🐰', nick:'槟城小灵', wish:'祝大家今年平安喜乐 🏮'},
                    {av:'🐯', nick:'雪隆守护', wish:'希望世界和平，找到真爱 ✨'},
                    {av:'🐼', nick:'柔佛熊猫', wish:'有人想一起去吃肉骨茶吗？☕'},
                    {av:'🦊', nick:'月光狐', wish:'抛下橘子，缘分就会到来哦~'},
                    {av:'🐰', nick:'路人甲', wish:'Huat Ah! 🧨'}
                ];
                spirits.forEach(s => {
                    riverRef.push({
                        ...s, top: Math.random() * 60 + 20, lastGlowAt: 0, timestamp: Date.now()
                    });
                });
            }
        });
    }

    function createOrangeUI(data, id) {
        const div = document.createElement('div');
        div.className = 'orange'; div.id = id;
        div.style.top = data.top + '%';
        div.innerHTML = '🍊';
        div.onclick = () => viewOrange(id);

        // 随机速度，防止重叠
        const speed = 18 + (Math.random() * 10);
        div.style.animationDuration = `${speed}s, 4s`;

        document.getElementById('game-river').appendChild(div);
    }

    function tossOrange() {
        const wish = document.getElementById('wishInput').value;
        if(!wish) return alert("请写下愿望！");
        riverRef.push({
            uid: userUID, avatar: myAv, nick: myName || "无名氏",
            wish: wish, top: Math.random() * 60 + 20,
            lastGlowAt: 0, timestamp: firebase.database.ServerValue.TIMESTAMP
        });
        closeAll();
        document.getElementById('wishInput').value = "";
    }

    function submitComment() {
        const val = document.getElementById('commentIn').value;
        if(!val || !activeId) return;
        db.ref(`oranges/${activeId}/comments`).push({ user: myName || "有缘人", text: val, time: Date.now() });
        db.ref(`oranges/${activeId}`).update({ lastGlowAt: firebase.database.ServerValue.TIMESTAMP });
        document.getElementById('commentIn').value = "";
    }

    function viewOrange(id) {
        activeId = id; const data = orangeData[id];
        document.getElementById('viewAv').innerText = data.avatar;
        document.getElementById('viewNick').innerText = data.nick;
        document.getElementById('viewWish').innerText = data.wish;
        renderComments(data.comments); openPanel('viewPanel');
    }

    function renderComments(obj) {
        const box = document.getElementById('chatBox'); if(!obj) { box.innerHTML = ""; return; }
        box.innerHTML = Object.values(obj).map(c => `<div class="comment-wrap"><b>${c.user}:</b> ${c.text}</div>`).join('');
        box.scrollTop = box.scrollHeight;
    }

    function triggerGlow(id) { const el = document.getElementById(id); if (el) { el.classList.add('glow-active'); setTimeout(() => el.classList.remove('glow-active'), 3000); } }
    function pickAvatar(el, icon) { document.querySelectorAll('.avatar-opt').forEach(o => o.classList.remove('selected')); el.classList.add('selected'); myAv = icon; }
    function openPanel(id) { document.getElementById('overlay').style.display = 'block'; document.getElementById(id).classList.add('active'); }
    function nextToWish() { myName = document.getElementById('nickInput').value; document.getElementById('setupPanel').classList.remove('active'); document.getElementById('wishHeader').innerText = myAv + " " + myName + " 的愿望"; document.getElementById('wishPanel').classList.add('active'); }
    function closeAll() { document.querySelectorAll('.panel').forEach(p => p.classList.remove('active')); document.getElementById('overlay').style.display = 'none'; activeId = null; }
</script>
</body>
</html>
